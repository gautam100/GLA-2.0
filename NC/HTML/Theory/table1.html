<!DOCTYPE html>
<html>
<head>
	<title>Table tag </title>
</head>
<body>
	<h1>Table tag</h1>
	<table align="center" border="1" cellpadding="5" cellspacing="0">
	
	<tr bgcolor="#059862">
		<th>Sr. No.</th>
		<th>Name</th>
		<th>Salary</th>
	</tr>
	<tr>
		<td>1</td>
		<td>Raj</td>
		<td>50K</td>
	</tr>
	<tr>
		<td>2</td>
		<td>Laxman</td>
		<td rowspan="2">60K</td>
	</tr>
	<tr>
		<td>3</td>
		<td>Rohit</td>
		
	</tr>
	</table>
</body>
</html>
