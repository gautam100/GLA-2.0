<!DOCTYPE HTML>
<html>
	<head>
		<title> Complex table</title>
	</head>
	<body>
	<table align="center" border="1" cellpadding="5" cellspacing="0"  width="60%">
	<tr>
		<th>Sr. No.</th>
		<th>Name</th>
		<th>Department</th>
		<th>Designation</th>
		<th>Salary</th>
	</tr>
	<tr>
		<td>1</td>
		<td>Rohit</td>
		<td rowspan="2">Sales</td>
		<td>Manager</td>
		<td>80000</td>
	</tr>
	<tr>
		<td>2</td>
		<td>Sachin</td>
		<!--<td>Sales</td>-->
		<td>Executive</td>
		<td>60000</td>
	</tr>
	<tr>
		<td>3</td>
		<td>Neha</td>
		<td>HR</td>
		<td>Sr. Manager</td>
		<td>90000</td>
	</tr>
	<tr>
		<td>4</td>
		<td>Piyush</td>
		<td rowspan="2">IT</td>
		<td>Software Engineer</td>
		<td>125000</td>
	</tr>
	<tr>
		<td>5</td>
		<td>Manish</td>
		<!--<td>IT</td>-->
		<td colspan="2">Team Leader</td>
		
	</tr>
	</table>

	<table align="center" border="1" cellpadding="5" cellspacing="0"  width="60%">
	<tr>
		<td rowspan="3">Day</td>
		<td colspan="3">Seminar</td>
		
	</tr>
	<tr>	
		<td colspan="2">Schedule</td>
		<td rowspan="2">Topic</td>
	</tr>
	<tr>
		<td>begin</td>
		<td>end</td>
	</tr>
	</table>


	</body>
</html>
