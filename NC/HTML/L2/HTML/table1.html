<!DOCTYPE HTML>
<html>
	<head>
		<title> Report card </title>
	</head>
	<body>
	<center>
		<h1>Student Report Card</h1>
		<span>Editable school progress report </span>

	<table align="center" border="1" cellpadding="5" cellspacing="0"  width="60%">
	<tr>
		<td width="50%">Name: <input type="text" /></td>
		<td width="50%">School Year:</td>
	</tr>
	<tr>
		<td>
		Grade:  <input type="radio" name="grade" />A
			<input type="radio" name="grade" />B
			<input type="radio" name="grade" />C
		</td>
		<td>Term:</td>
	</tr>
	<tr>
		<td>Teacher:</td>
		<td>Date:</td>
	</tr>
	</table>

	<br /> <br />

	<table align="center" border="1" cellpadding="5" cellspacing="0" width="60%">
	<tr bgcolor="#000000" height="40px">
		<th style="color:#FFFFFF;" width="40%">SUBJECT</th>
		<th style="color:#FFFFFF;" width="20%">GRADE Q1</th>
		<th style="color:#FFFFFF;" width="20%">GRADE Q2</th>
		<th style="color:#FFFFFF;" width="20%">GRADE Q3</th>
	</tr>
	<tr align="center">
		<td>Literature</td>
		<td>A</td>
		<td>A</td>
		<td>A</td>
	</tr>
	<tr align="center">
		<td>History</td>
		<td>B+</td>
		<td>B+</td>
		<td>B+</td>
	</tr>
	<tr align="center">
		<td>Geography</td>
		<td>C</td>
		<td>C</td>
		<td>C</td>
	</tr><tr align="center">
		<td>Algebra</td>
		<td>C</td>
		<td>C</td>
		<td>C</td>
	</tr><tr align="center">
		<td>Social Science</td>
		<td>B</td>
		<td>B</td>
		<td>B</td>
	</tr>
	</table>
	</center>
	</body>
</html>
